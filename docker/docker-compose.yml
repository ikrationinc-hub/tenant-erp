name: hyperion-erp

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: hyperion
      POSTGRES_PASSWORD: hyperion
      POSTGRES_DB: hyperion
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperion -d hyperion"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hyperion
      MINIO_ROOT_PASSWORD: hyperion123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    # Definition download on first boot can take a few minutes - clamd
    # doesn't start listening until it's done, so the healthcheck (not a
    # fixed startup delay) is what core/storage/scanner.ts's callers
    # should actually wait on.
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 5m

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
